version: '3.8'

services:
  cf-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cf-contest-agent
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    volumes:
      # Mount data volume for persistent SQLite database and credentials
      - ./data:/usr/src/app/data
      # Mount logs volume for daily rotating log files
      - ./logs:/usr/src/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
